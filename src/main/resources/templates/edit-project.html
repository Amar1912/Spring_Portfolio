<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Project</title>

  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<h1>Edit Project</h1>

<form action="/admin/project/update"
      method="post"
      enctype="multipart/form-data">

  <!-- Hidden ID -->
  <input type="hidden"
         name="id"
         th:value="${project.id}">

  <!-- Project Name -->
  <label>Project Name</label>

  <input type="text"
         name="projectName"
         th:value="${project.projectName}">

  <!-- Description -->
  <label>Description</label>

  <textarea
          name="projectDescription"
          rows="5"
          th:text="${project.projectDescription}">
    </textarea>

  <!-- Technologies -->
  <label>Technologies</label>

  <input type="text"
         name="technologies"
         th:value="${project.technologies}">

  <!-- GitHub -->
  <label>GitHub</label>

  <input type="url"
         name="githubLink"
         th:value="${project.githubLink}">

  <!-- Live Demo -->
  <label>Live Demo</label>

  <input type="url"
         name="liveDemo"
         th:value="${project.liveDemo}">

  <!-- New Image -->
  <label>Project Image</label>

  <input type="file"
         name="image">

  <button type="submit">
    Update Project
  </button>

</form>

</body>
</html>
